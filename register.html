<!DOCTYPE html>
<html>
<head>

<title>Visitor Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
padding:20px;
}

h2{
margin-bottom:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#007BFF;
color:white;
border:none;
padding:12px;
width:95%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#qr{
margin-top:25px;
}

</style>

</head>

<body>

<h2>Visitor Registration</h2>

<div class="form-box">

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="prant" placeholder="Prant">
<input id="vibhag" placeholder="Vibhag">
<input id="jila" placeholder="Jila">
<input id="nagar" placeholder="Nagar">
<input id="basti" placeholder="Basti">
<input id="mobile" placeholder="Mobile">

<button onclick="register()">Register</button>

<div id="qr"></div>

</div>

<script>

function register(){

let name = document.getElementById("name").value.trim()
let address = document.getElementById("address").value.trim()
let prant = document.getElementById("prant").value.trim()
let vibhag = document.getElementById("vibhag").value.trim()
let jila = document.getElementById("jila").value.trim()
let nagar = document.getElementById("nagar").value.trim()
let basti = document.getElementById("basti").value.trim()
let mobile = document.getElementById("mobile").value.trim()

// validation

if(!name || !address || !prant || !vibhag || !jila || !nagar || !basti || !mobile){

alert("Please fill all fields")
return

}

if(mobile.length < 10){

alert("Enter valid mobile number")
return

}

let data = {

name:name,
address:address,
prant:prant,
vibhag:vibhag,
jila:jila,
nagar:nagar,
basti:basti,
mobile:mobile

}

// send to sheet

fetch("https://script.google.com/macros/s/AKfycbwL-4eTJquedO10DfY3q1B6gQCvSv_Vhc0B0fhWX8u-wj9vZ7y4PHuVQlRuZXiwt2kk/exec",{

method:"POST",
body:JSON.stringify(data)

})

// generate QR

let qrdata = JSON.stringify(data)

let qr = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(qrdata)

document.getElementById("qr").innerHTML =

"<h3>Registration Successful</h3>"+
"<img src='"+qr+"'>"+
"<p>Save this QR for entry</p>"

}

</script>

</body>
</html>
