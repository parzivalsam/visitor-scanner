<!DOCTYPE html>
<html>
<head>

<title>Visitor Entry Scanner</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:360px;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Visitor Entry Scanner</h2>

<div class="box">

<div id="reader"></div>

<div id="result"></div>

</div>

<script>

let lastScan = ""
let lock = false

function onScanSuccess(result){

if(lock) return

try{

let data = JSON.parse(result)

if(lastScan === data.mobile){
return
}

lock = true
lastScan = data.mobile

fetch("https://script.google.com/macros/s/AKfycbyOJFVGCopO6mYPb2BmIDxQBMRYp8jIVUsrjZjnpffbOrsLuqAKutKr7-YeAt1KZNHUhQ/exec",{

method:"POST",
body:JSON.stringify(data)

})

.then(res=>res.text())

.then(res=>{

if(res=="ALREADY_SCANNED"){

alert("⚠ Visitor already entered")

}else{

alert("✅ Entry recorded for " + data.name)

}

})

}catch(e){

alert("Invalid QR")

}

setTimeout(()=>{

lock=false

},3000)

}

new Html5QrcodeScanner(
"reader",
{fps:10, qrbox:250}
).render(onScanSuccess)

</script>

</body>
</html>
