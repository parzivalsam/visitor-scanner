<!DOCTYPE html>
<html>
<head>

<title>Visitor Entry Scanner</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:380px;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.green{color:green;}
.red{color:red;}

</style>

</head>

<body>

<h2>Visitor Entry Scanner</h2>

<div class="box">

<div id="reader"></div>

<div id="result"></div>

</div>

<script>

let lastMobile = ""
let lastTime = 0

function onScanSuccess(result){

try{

let data = JSON.parse(result)
let now = Date.now()

// block same qr within 5 sec

if(data.mobile === lastMobile && (now-lastTime)<5000){

document.getElementById("result").innerHTML =
"<span class='red'>⚠ Already Scanned</span>"

return
}

lastMobile = data.mobile
lastTime = now

// show instant UI

document.getElementById("result").innerHTML =
"<span class='green'>✅ Scanned : "+data.name+"</span>"


// send to server (background)

fetch("https://script.google.com/macros/s/AKfycbxsm6llhaWjjvhNOcfefjYUjuLVNA22mI4mrqkGxTi8HCFZx9HezAe-E06VD2nRSHRZSw/exec",{

method:"POST",
body:JSON.stringify(data)

})
.then(res=>res.text())
.then(res=>{

if(res=="ALREADY_SCANNED"){

document.getElementById("result").innerHTML =
"<span class='red'>⚠ Already Entered : "+data.name+"</span>"

}

})

}catch(e){

document.getElementById("result").innerHTML =
"<span class='red'>Invalid QR</span>"

}

}

new Html5QrcodeScanner(
"reader",
{
fps:20,
qrbox:220
}
).render(onScanSuccess)

</script>

</body>
</html>
