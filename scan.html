<!DOCTYPE html>
<html>
<head>

<title>Visitor Entry Scanner</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:360px;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

#reader{
margin:auto;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.success{
color:green;
}

.error{
color:red;
}

</style>

</head>

<body>

<h2>Visitor Entry Scanner</h2>

<div class="box">

<div id="reader"></div>

<div id="result"></div>

</div>

<script>

let scanning = true

function onScanSuccess(result){

if(!scanning) return

scanning = false

try{

let data = JSON.parse(result)

fetch("https://script.google.com/macros/s/AKfycbyil4ZUrLbQO1vSjOKRkbNjV249l9Muyubufiqn7pESL1rTdWo8qb570IWbhdZ5eCT8QA/exec",{

method:"POST",
body:JSON.stringify(data)

})

.then(res=>res.text())

.then(res=>{

if(res=="ALREADY_SCANNED"){

document.getElementById("result").innerHTML =
"<span class='error'>⚠ Already Entered</span>"

}else{

document.getElementById("result").innerHTML =
"<span class='success'>✅ Entry Recorded for "+data.name+"</span>"

}

})

}catch(e){

document.getElementById("result").innerHTML =
"<span class='error'>Invalid QR Code</span>"

}

setTimeout(()=>{ scanning=true },3000)

}

new Html5QrcodeScanner(
"reader",
{fps:10, qrbox:250}
).render(onScanSuccess)

</script>

</body>
</html>
