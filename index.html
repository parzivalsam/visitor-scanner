<!DOCTYPE html>
<html>
<head>
<title>Visitor Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h2>Scan Visitor QR</h2>

<div id="reader" style="width:300px"></div>

<script>

function onScanSuccess(decodedText){

 let visitor = JSON.parse(decodedText)

 fetch("https://script.google.com/macros/s/AKfycbxUcbWiQv0zHRJgxwgiolbiwm62s9Bj60RRjyjAA4FIIGPWkVs6e5er5D1juX8h3X4s/exec",{
  method:"POST",
  body:JSON.stringify(visitor)
 })

 alert("Visitor Logged: "+visitor.name)

}

</script>

</body>
</html>
