<!DOCTYPE html>
<html>
<head>
<title>Visitor Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h2>Scan Visitor QR</h2>

<div id="reader" style="width:300px"></div>

<script>

function onScanSuccess(decodedText){

let visitor = JSON.parse(decodedText)

let url =
"https://script.google.com/macros/s/AKfycbzl1OScKyWO8vzG-n0be4CXw6T8qjAkB6Rx8hgPJquTuRT-mytmPJXWg0QW-a7ORe_v/exec"+
"?name="+encodeURIComponent(visitor.name)+
"&address="+encodeURIComponent(visitor.address)+
"&prant="+encodeURIComponent(visitor.prant)+
"&vibhag="+encodeURIComponent(visitor.vibhag)+
"&jila="+encodeURIComponent(visitor.jila)+
"&nagar="+encodeURIComponent(visitor.nagar)+
"&basti="+encodeURIComponent(visitor.basti)+
"&mobile="+encodeURIComponent(visitor.mobile)

fetch(url)

alert("Visitor Logged: "+visitor.name)

}
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(onScanSuccess)
</script>

</body>
</html>
