<!DOCTYPE html>
<html>
<head>
<title>Visitor Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h2>Scan Visitor QR</h2>

<div id="reader" style="width:300px"></div>

<script>

function onScanSuccess(decodedText){

 let visitor = JSON.parse(decodedText)
 
 visitor.scan = true

 fetch("https://script.google.com/macros/s/AKfycbz6z37FJdbMSbSYLFt8KN0lgffOcs7pmHcDDs5WXMEco3WSWiMLlXAfFTDUefKcGCfW/exec",{
  method:"POST",
  body:JSON.stringify(visitor)
 })

 alert("Visitor Logged: "+visitor.name)

}
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(onScanSuccess)
</script>

</body>
</html>
